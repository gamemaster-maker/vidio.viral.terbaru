<title>Video Viral</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#0f0f0f;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.player{

position:relative;

width:900px;
max-width:95vw;

cursor:pointer;

overflow:hidden;

border-radius:18px;

box-shadow:0 30px 80px rgba(0,0,0,.6);

transition:.25s;

}

.player:hover{

transform:scale(1.01);

}

.player img{

width:100%;
display:block;

}

.overlay{

position:absolute;
inset:0;

background:linear-gradient(transparent 40%,rgba(0,0,0,.65));

}

.play{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:110px;
height:110px;

border-radius:50%;

background:rgba(255,0,0,.92);

display:flex;
justify-content:center;
align-items:center;

box-shadow:0 0 35px rgba(255,0,0,.6);

}

.play:before{

content:"";

margin-left:8px;

border-left:38px solid white;
border-top:24px solid transparent;
border-bottom:24px solid transparent;

}

.duration{

position:absolute;

right:15px;
bottom:18px;

background:rgba(0,0,0,.8);

color:white;

padding:6px 10px;

border-radius:5px;

font-size:15px;

font-weight:bold;

}

.views{

position:absolute;

left:18px;
bottom:18px;

color:white;

font-size:18px;

font-weight:bold;

text-shadow:0 2px 5px black;

}

.title{

position:absolute;

left:18px;

bottom:55px;

right:18px;

font-size:28px;

font-weight:bold;

color:white;

text-shadow:0 3px 10px black;

line-height:1.3;

}

.bar{

position:absolute;

left:0;
bottom:0;

height:6px;

width:100%;

background:#444;

}

.bar span{

display:block;

height:100%;

width:42%;

background:#ff0000;

}

</style>

</head>

<body>
